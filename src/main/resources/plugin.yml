name: VampireZ
version: 1.1.1
main: com.vampirez.VampireZPlugin
api-version: 1.21
author: YourName
description: VampireZ Minigame Plugin

commands:
  vampirez:
    description: Main command for VampireZ
    usage: /vampirez <subcommand>
    aliases: [vz]

permissions:
  vampirez.admin:
    description: Allows access to admin commands
    default: op
  vampirez.play:
    description: Allows playing the game
    default: true
